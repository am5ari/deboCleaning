<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Poppins,sans-serif;
  background:linear-gradient(135deg,#06111f,#102b45);
  color:white;
  min-height:100vh;
  padding:24px;
}
.container{max-width:1100px;margin:auto}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  padding:18px;
  margin-bottom:22px;
}
a,button{
  border:none;
  border-radius:999px;
  padding:12px 18px;
  font-weight:800;
  cursor:pointer;
  text-decoration:none;
  font-family:inherit;
}
.btn{background:#00ffd0;color:#06111f}
.dark{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.16)}
.danger{background:#ff4d6d;color:white}
.card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:28px;
  padding:22px;
  margin-bottom:20px;
}
input,textarea,select{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  color:white;
  margin-bottom:12px;
  font-family:inherit;
}
select option{color:black}
textarea{min-height:100px}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}
.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}
.item img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:18px;
}
.pic-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
#adminArea{display:none}
@media(max-width:800px){
  .grid,.gallery,.pic-grid{grid-template-columns:1fr}
  .topbar{flex-direction:column;align-items:flex-start}
}
</style>
</head>

<body>
<div class="container">

  <div id="loginArea" class="card">
    <h1>Gallery Admin Login</h1>
    <input id="email" type="email" placeholder="Admin Email">
    <input id="password" type="password" placeholder="Password">
    <button class="btn" id="loginBtn">Login</button>
    <p id="loginMsg"></p>
  </div>

  <div id="adminArea">
    <div class="topbar">
      <div>
        <h1>Before & After Gallery Admin</h1>
        <p>Upload cleaning transformation pictures.</p>
      </div>
      <div>
        <a class="dark" href="index.html">Website</a>
        <a class="dark" href="before-after.html">Gallery</a>
        <button class="danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="card">
      <h2>Upload Before & After</h2>

      <div class="grid">
        <input id="title" placeholder="Title ex: Kitchen Deep Clean">
        <select id="category">
          <option value="">Select Category</option>
          <option>Kitchen</option>
          <option>Bathroom</option>
          <option>Bedroom</option>
          <option>Living Room</option>
          <option>Office</option>
          <option>Move-Out</option>
          <option>Other</option>
        </select>
      </div>

      <textarea id="description" placeholder="Description"></textarea>

      <label>Before Picture</label>
      <input id="beforeFile" type="file" accept="image/*">

      <label>After Picture</label>
      <input id="afterFile" type="file" accept="image/*">

      <button class="btn" id="uploadBtn">Upload Gallery Item</button>
      <p id="uploadMsg"></p>
    </div>

    <h2>Uploaded Gallery Items</h2>
    <div id="galleryList" class="gallery"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  serverTimestamp,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-8CcPT5Kiw2JezxSPcHljBHufVKUDFLY",
  authDomain: "debo-cleaning.firebaseapp.com",
  projectId: "debo-cleaning",
  storageBucket: "debo-cleaning.firebasestorage.app",
  messagingSenderId: "561419239094",
  appId: "1:561419239094:web:e6bf2e310ab06cf5b33017",
  measurementId: "G-R3NQMR679X"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const loginArea = document.getElementById("loginArea");
const adminArea = document.getElementById("adminArea");
const loginMsg = document.getElementById("loginMsg");
const uploadMsg = document.getElementById("uploadMsg");

document.getElementById("loginBtn").onclick = async () => {
  try {
    await signInWithEmailAndPassword(
      auth,
      document.getElementById("email").value.trim(),
      document.getElementById("password").value.trim()
    );
  } catch {
    loginMsg.textContent = "Login failed. Check email and password.";
    loginMsg.style.color = "#ff6b6b";
  }
};

document.getElementById("logoutBtn").onclick = () => signOut(auth);

onAuthStateChanged(auth, user => {
  if (user) {
    loginArea.style.display = "none";
    adminArea.style.display = "block";
    loadGallery();
  } else {
    loginArea.style.display = "block";
    adminArea.style.display = "none";
  }
});

document.getElementById("uploadBtn").onclick = async () => {
  const title = document.getElementById("title").value.trim();
  const category = document.getElementById("category").value;
  const description = document.getElementById("description").value.trim();
  const beforeFile = document.getElementById("beforeFile").files[0];
  const afterFile = document.getElementById("afterFile").files[0];

  if (!title || !category || !beforeFile || !afterFile) {
    uploadMsg.textContent = "Please add title, category, before picture, and after picture.";
    uploadMsg.style.color = "#ff6b6b";
    return;
  }

  try {
    uploadMsg.textContent = "Uploading...";
    uploadMsg.style.color = "#00ffd0";

    const id = Date.now();

    const beforeRef = ref(storage, `beforeAfter/${id}-before-${beforeFile.name}`);
    const afterRef = ref(storage, `beforeAfter/${id}-after-${afterFile.name}`);

    await uploadBytes(beforeRef, beforeFile);
    await uploadBytes(afterRef, afterFile);

    const beforeURL = await getDownloadURL(beforeRef);
    const afterURL = await getDownloadURL(afterRef);

    await addDoc(collection(db, "beforeAfter"), {
      title,
      category,
      description,
      beforeURL,
      afterURL,
      createdAt: serverTimestamp()
    });

    document.getElementById("title").value = "";
    document.getElementById("category").value = "";
    document.getElementById("description").value = "";
    document.getElementById("beforeFile").value = "";
    document.getElementById("afterFile").value = "";

    uploadMsg.textContent = "Gallery item uploaded!";
  } catch (err) {
    console.error(err);
    uploadMsg.textContent = "Upload failed. Check Firebase Storage rules.";
    uploadMsg.style.color = "#ff6b6b";
  }
};

function loadGallery() {
  const q = query(collection(db, "beforeAfter"), orderBy("createdAt", "desc"));

  onSnapshot(q, snapshot => {
    const galleryList = document.getElementById("galleryList");
    galleryList.innerHTML = "";

    snapshot.forEach(docSnap => {
      const item = docSnap.data();
      const id = docSnap.id;

      const div = document.createElement("div");
      div.className = "card item";

      div.innerHTML = `
        <h3>${item.title}</h3>
        <p>${item.category}</p>
        <div class="pic-grid">
          <img src="${item.beforeURL}">
          <img src="${item.afterURL}">
        </div>
        <p>${item.description || ""}</p>
        <button class="danger">Delete</button>
      `;

      div.querySelector("button").onclick = async () => {
        if (confirm("Delete this gallery item?")) {
          await deleteDoc(doc(db, "beforeAfter", id));
        }
      };

      galleryList.appendChild(div);
    });
  });
}
</script>
</body>
</html>
