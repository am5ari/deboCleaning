<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Before & After Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Poppins,sans-serif;
  background:#07111f;
  color:white;
}

.hero{
  padding:28px 7% 70px;
  background:
    radial-gradient(circle at top left,rgba(0,255,200,.25),transparent 35%),
    linear-gradient(135deg,#06111f,#102b45);
}

/* NAVBAR */
.navbar{
  position:sticky;
  top:18px;
  z-index:999;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 22px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.14);
  border-radius:999px;
  backdrop-filter:blur(18px);
}

.navbar > img{
  height:45px;
  width:auto;
}

.nav-logo{
  color:white;
  text-decoration:none;
  font-weight:900;
  font-size:1.1rem;
}

.nav-logo img{
  height:58px;
  width:auto;
  object-fit:contain;
}

.nav-links{
  display:flex;
  align-items:center;
  gap:18px;
}

.nav-links a{
  color:white;
  text-decoration:none;
  font-weight:800;
  font-size:.95rem;
}

.book-link{
  background:#00ffd0;
  color:#06111f !important;
  padding:12px 16px;
  border-radius:999px;
}

.menu-btn{
  display:none;
  background:#00ffd0;
  color:#06111f;
  border:none;
  width:48px;
  height:48px;
  border-radius:50%;
  font-size:1.5rem;
  font-weight:900;
  cursor:pointer;
}

/* PAGE */
h1{
  font-size:clamp(2.5rem,7vw,5.5rem);
  line-height:1;
  margin:80px 0 15px;
}

.hero p{
  color:#c7d5e5;
  max-width:700px;
  line-height:1.7;
}

section{
  padding:70px 7%;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:24px;
}

.card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:30px;
  padding:20px;
  backdrop-filter:blur(14px);
}

.images{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.image-box{
  position:relative;
}

.image-box img{
  width:100%;
  height:320px;
  object-fit:cover;
  border-radius:22px;
}

.label{
  position:absolute;
  top:12px;
  left:12px;
  padding:8px 13px;
  border-radius:999px;
  font-weight:900;
  font-size:.8rem;
}

.before{background:#ff4d6d}
.after{background:#00ffd0;color:#06111f}

.category{
  display:inline-block;
  margin-top:16px;
  padding:8px 13px;
  border-radius:999px;
  background:rgba(0,255,208,.14);
  color:#00ffd0;
  font-weight:800;
}

.card h2{
  margin-bottom:5px;
}

.card p{
  color:#b8c7d9;
  line-height:1.6;
}

.empty{
  text-align:center;
  color:#b8c7d9;
  padding:50px;
}

/* MOBILE */
@media(max-width:850px){
  .navbar{
    border-radius:28px;
  }

  .menu-btn{
    display:block;
  }

  .nav-links{
    position:fixed;
    top:95px;
    left:7%;
    right:7%;
    display:flex;
    flex-direction:column;
    align-items:stretch;
    gap:12px;
    padding:18px;
    background:rgba(6,17,31,.96);
    border:1px solid rgba(255,255,255,.14);
    border-radius:28px;
    backdrop-filter:blur(20px);
    box-shadow:0 25px 70px rgba(0,0,0,.45);
    opacity:0;
    pointer-events:none;
    transform:translateY(-12px);
    transition:.25s ease;
  }

  .nav-links.active{
    opacity:1;
    pointer-events:auto;
    transform:translateY(0);
  }

  .nav-links a{
    margin:0;
    padding:15px;
    border-radius:18px;
    background:rgba(255,255,255,.08);
    text-align:center;
    font-size:1rem;
  }

  .book-link{
    background:#00ffd0 !important;
    color:#06111f !important;
  }

  .gallery,
  .images{
    grid-template-columns:1fr;
  }

  .image-box img{
    height:260px;
  }
}
</style>
</head>

<body>

<div class="hero">

  <nav class="navbar">
    <img src="Logo.png" alt="Debo Cleaning Logo"></a>

    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="index.html#services">Prices</a>
      
      <a href="index.html#owner">Owner</a>
      <a href="index.html#book" class="book-link">Book Now</a>
    </div>

    <button class="menu-btn" id="menuBtn">☰</button>
  </nav>

  <h1>Before & After</h1>
  <p>See real cleaning transformations from completed jobs.</p>
</div>

<section>
  <div id="gallery" class="gallery"></div>
</section>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-8CcPT5Kiw2JezxSPcHljBHufVKUDFLY",
  authDomain: "debo-cleaning.firebaseapp.com",
  projectId: "debo-cleaning",
  storageBucket: "debo-cleaning.firebasestorage.app",
  messagingSenderId: "561419239094",
  appId: "1:561419239094:web:e6bf2e310ab06cf5b33017",
  measurementId: "G-R3NQMR679X"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const gallery = document.getElementById("gallery");

const q = query(collection(db, "beforeAfter"), orderBy("createdAt", "desc"));

onSnapshot(q, snapshot => {
  gallery.innerHTML = "";

  if (snapshot.empty) {
    gallery.innerHTML = `<div class="empty">No before and after photos uploaded yet.</div>`;
    return;
  }

  snapshot.forEach(docSnap => {
    const item = docSnap.data();

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="images">
        <div class="image-box">
          <span class="label before">Before</span>
          <img src="${item.beforeURL}" alt="Before cleaning">
        </div>

        <div class="image-box">
          <span class="label after">After</span>
          <img src="${item.afterURL}" alt="After cleaning">
        </div>
      </div>

      <span class="category">${item.category || "Cleaning"}</span>
      <h2>${item.title || "Cleaning Transformation"}</h2>
      <p>${item.description || ""}</p>
    `;

    gallery.appendChild(card);
  });
});
</script>

<script>
const menuBtn = document.getElementById("menuBtn");
const navLinks = document.getElementById("navLinks");

menuBtn.addEventListener("click", () => {
  navLinks.classList.toggle("active");
  menuBtn.textContent = navLinks.classList.contains("active") ? "✕" : "☰";
});

document.querySelectorAll(".nav-links a").forEach(link => {
  link.addEventListener("click", () => {
    navLinks.classList.remove("active");
    menuBtn.textContent = "☰";
  });
});
</script>

</body>
</html>
