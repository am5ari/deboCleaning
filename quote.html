<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request A Quote | Debos Cleaning</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top">
  <img src="Logo.png" class="logo" alt="Debos Cleaning">
  <div class="phone">(859) 000-0000<br></div>
</header>

<nav class="nav">
  <button class="menu-btn" onclick="toggleMenu()">☰</button>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="services.html">Cleaning Services</a>
    <a href="quote.html" class="active">Request A Quote</a>
    <a href="contact.html">Contact Us</a>
  </div>
</nav>

<section class="page-hero quote-hero">
  <h1>Request A Quote</h1>
</section>

<section class="quote-page">
  <form class="quote-form large-form">
    <h2>Get A Free Quote Today</h2>

    <div class="form-row">
      <input type="text" placeholder="Name" required>
      <input type="email" placeholder="Email Address" required>
    </div>

    <div class="form-row">
      <input type="tel" placeholder="Phone">
      <input type="text" placeholder="City and State">
    </div>

    <select required>
      <option value="">Select Service</option>
      <option>Commercial Cleaning</option>
      <option>Residential Cleaning</option>
      <option>Deep Cleaning</option>
      <option>Move-In / Move-Out</option>
      <option>Office Cleaning</option>
      <option>Floor Care</option>
    </select>

    <textarea placeholder="Tell us about the job..." required></textarea>

    <button type="submit">Submit Quote Request</button>
  </form>
</section>

<footer>
  © 2026 Debos Cleaning. All rights reserved.
</footer>

<script src="script.js"></script>
</body>
</html>
